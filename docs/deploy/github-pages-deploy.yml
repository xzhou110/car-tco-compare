# GitHub Pages deploy workflow for the app/ folder.
#
# I couldn't commit this under .github/workflows/ directly because the push
# credential lacks the GitHub "workflow" OAuth scope. To activate it:
#
#   Option A (no scope needed): on GitHub, click "Add file" → "Create new file",
#   name it  .github/workflows/deploy.yml , paste this content, commit.
#   Then: repo Settings → Pages → Build and deployment → Source = "GitHub Actions".
#   Site will publish at  https://xzhou110.github.io/car-tco-compare/
#
#   Option B (local): run  gh auth refresh -s workflow  to grant the scope, then
#   move this file to .github/workflows/deploy.yml and push.
# -----------------------------------------------------------------------------
name: Deploy app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm run build
        working-directory: app
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
