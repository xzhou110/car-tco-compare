name: Deal Alerts

# Twice daily, timed for when fresh dealer inventory lands (intentionally NOT evenly spread):
#   15:00 UTC = 8am Pacific  — catches the overnight DMS-feed wave (most new listings appear overnight)
#   21:00 UTC = 2pm Pacific  — catches midday / early-afternoon additions
# GitHub cron is fixed UTC (no DST), so in PST these shift to 7am / 1pm — still morning + midday.
on:
  schedule:
    - cron: '0 15 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch: {}

concurrency:
  group: deal-alerts
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rav4-alert
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund

      - name: Refresh listings cache (Auto.dev → Supabase)
        run: node cache-refresh.mjs
        continue-on-error: true  # quota/transient refresh failure must not block digests
        env:
          AUTODEV_API_KEY: ${{ secrets.AUTODEV_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

      - name: Send confirmation emails (double opt-in)
        run: node send-confirmations.mjs
        continue-on-error: true  # a confirmation hiccup must not block digests to confirmed users
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

      - name: Send subscriber digests
        run: node alert-cron.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
